name: Calls a script

on: workflow_call

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with: 
        repository: kaydeejay/a-simple-reusable-workflow
        ref: main
    - name: run-the-script
      run: |
        node ./src/callable-script.js
